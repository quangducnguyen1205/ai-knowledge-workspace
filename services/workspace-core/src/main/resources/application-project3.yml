spring:
  config:
    activate:
      on-profile: project3

workspace:
  security:
    authentication-mode: legacy_session
  processing:
    trigger-mode: kafka_request
    request-relay:
      enabled: true
  search:
    indexing:
      auto-request-enabled: true
    indexing-relay:
      enabled: true
  kafka:
    enabled: true
    processing-result-listener-enabled: true
    indexing-listener-enabled: true

integration:
  fastapi:
    base-url: http://127.0.0.1:8000
    assistant-read-timeout: 75s

outbox:
  recovery:
    enabled: true
