spring:
  application:
    name: workspace-core
  datasource:
    url: jdbc:postgresql://${WORKSPACE_CORE_POSTGRES_HOST:localhost}:${WORKSPACE_CORE_POSTGRES_PORT:5434}/${WORKSPACE_CORE_POSTGRES_DB:workspace_core}
    username: ${WORKSPACE_CORE_POSTGRES_USER:workspace_core}
    password: ${WORKSPACE_CORE_POSTGRES_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: ${WORKSPACE_CORE_JPA_DDL_AUTO:validate}
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: ${WORKSPACE_CORE_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: ${WORKSPACE_CORE_FLYWAY_BASELINE_ON_MIGRATE:false}
  servlet:
    multipart:
      max-file-size: ${WORKSPACE_CORE_MAX_FILE_SIZE:200MB}
      max-request-size: ${WORKSPACE_CORE_MAX_REQUEST_SIZE:200MB}

server:
  port: ${SERVER_PORT:8081}

workspace:
  default-id: ${DEFAULT_WORKSPACE_ID:00000000-0000-0000-0000-000000000001}
  default-name: ${DEFAULT_WORKSPACE_NAME:Default Workspace}
  security:
    authentication-mode: ${WORKSPACE_CORE_SECURITY_AUTHENTICATION_MODE:legacy_session}
    oidc:
      issuer-uri: ${WORKSPACE_CORE_SECURITY_OIDC_ISSUER_URI:}
      jwk-set-uri: ${WORKSPACE_CORE_SECURITY_OIDC_JWK_SET_URI:}
      audience: ${WORKSPACE_CORE_SECURITY_OIDC_AUDIENCE:}
  processing:
    trigger-mode: ${WORKSPACE_CORE_PROCESSING_TRIGGER_MODE:direct_upload}
    request-relay:
      enabled: ${WORKSPACE_CORE_PROCESSING_REQUEST_RELAY_ENABLED:false}
      fixed-delay: ${WORKSPACE_CORE_PROCESSING_REQUEST_RELAY_FIXED_DELAY:10s}
      batch-size: ${WORKSPACE_CORE_PROCESSING_REQUEST_RELAY_BATCH_SIZE:10}
    smoke:
      command: ${WORKSPACE_CORE_PROCESSING_SMOKE_COMMAND:none}
      result-event-file: ${WORKSPACE_CORE_PROCESSING_SMOKE_RESULT_EVENT_FILE:}
      request-outbox-event-id: ${WORKSPACE_CORE_PROCESSING_SMOKE_REQUEST_OUTBOX_EVENT_ID:}
    recovery:
      command: ${WORKSPACE_CORE_PROCESSING_RECOVERY_COMMAND:none}
      result-event-id: ${WORKSPACE_CORE_PROCESSING_RECOVERY_RESULT_EVENT_ID:}
      outbox-event-id: ${WORKSPACE_CORE_PROCESSING_RECOVERY_OUTBOX_EVENT_ID:}
      minimum-publishing-age: ${WORKSPACE_CORE_PROCESSING_RECOVERY_MINIMUM_PUBLISHING_AGE:5m}
  search:
    indexing:
      auto-request-enabled: ${WORKSPACE_CORE_SEARCH_INDEXING_AUTO_REQUEST_ENABLED:false}
    smoke:
      command: ${WORKSPACE_CORE_SEARCH_SMOKE_COMMAND:none}
      indexing-outbox-event-id: ${WORKSPACE_CORE_SEARCH_SMOKE_INDEXING_OUTBOX_EVENT_ID:}
  kafka:
    enabled: ${WORKSPACE_CORE_KAFKA_ENABLED:false}
    bootstrap-servers: ${WORKSPACE_CORE_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    processing-requested-topic: ${WORKSPACE_CORE_KAFKA_PROCESSING_REQUESTED_TOPIC:asset.processing.requested.v1}
    processing-result-topic: ${WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_TOPIC:asset.processing.result.v1}
    indexing-requested-topic: ${WORKSPACE_CORE_KAFKA_INDEXING_REQUESTED_TOPIC:asset.indexing.requested.v1}
    processing-result-listener-enabled: ${WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_LISTENER_ENABLED:false}
    processing-result-consumer-group: ${WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_CONSUMER_GROUP:workspace-processing-result-v1}
    processing-result-auto-offset-reset: ${WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_AUTO_OFFSET_RESET:latest}
    indexing-listener-enabled: ${WORKSPACE_CORE_KAFKA_INDEXING_LISTENER_ENABLED:false}
    indexing-consumer-group: ${WORKSPACE_CORE_KAFKA_INDEXING_CONSUMER_GROUP:workspace-search-indexer-v1}
    indexing-auto-offset-reset: ${WORKSPACE_CORE_KAFKA_INDEXING_AUTO_OFFSET_RESET:latest}
    send-timeout: ${WORKSPACE_CORE_KAFKA_SEND_TIMEOUT:10s}
    logging-placeholder-enabled: ${WORKSPACE_CORE_KAFKA_LOGGING_PLACEHOLDER_ENABLED:false}

outbox:
  relay:
    # Disabled by default; Phase 3C adds Kafka publishing but no scheduler.
    enabled: ${WORKSPACE_CORE_OUTBOX_RELAY_ENABLED:false}
    batch-size: ${WORKSPACE_CORE_OUTBOX_RELAY_BATCH_SIZE:20}
    max-attempts: ${WORKSPACE_CORE_OUTBOX_RELAY_MAX_ATTEMPTS:5}
    retry-delay: ${WORKSPACE_CORE_OUTBOX_RELAY_RETRY_DELAY:30s}

current-user:
  header-name: ${CURRENT_USER_HEADER_NAME:X-Current-User-Id}
  session-attribute-name: ${CURRENT_USER_SESSION_ATTRIBUTE:CURRENT_USER_ID}
  default-id: ${CURRENT_USER_ID:local-dev-user}
  dev-fallback-enabled: ${CURRENT_USER_DEV_FALLBACK_ENABLED:true}

integration:
  fastapi:
    base-url: ${FASTAPI_BASE_URL:http://localhost:8000}
    connect-timeout: ${FASTAPI_CONNECT_TIMEOUT:5s}
    read-timeout: ${FASTAPI_READ_TIMEOUT:30s}
  elasticsearch:
    base-url: ${ELASTICSEARCH_BASE_URL:http://localhost:9201}
    connect-timeout: ${ELASTICSEARCH_CONNECT_TIMEOUT:3s}
    read-timeout: ${ELASTICSEARCH_READ_TIMEOUT:10s}
    transcript-index-name: ${ELASTICSEARCH_TRANSCRIPT_INDEX_NAME:asset-transcript-rows}
  object-storage:
    endpoint: ${WORKSPACE_CORE_OBJECT_STORAGE_ENDPOINT:http://localhost:9000}
    region: ${WORKSPACE_CORE_OBJECT_STORAGE_REGION:us-east-1}
    bucket: ${WORKSPACE_CORE_OBJECT_STORAGE_BUCKET:workspace-media}
    access-key: ${WORKSPACE_CORE_OBJECT_STORAGE_ACCESS_KEY:minioadmin}
    secret-key: ${WORKSPACE_CORE_OBJECT_STORAGE_SECRET_KEY:minioadmin}
    path-style-access: ${WORKSPACE_CORE_OBJECT_STORAGE_PATH_STYLE_ACCESS:true}
