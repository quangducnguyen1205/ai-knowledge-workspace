services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ${WORKSPACE_CORE_POSTGRES_DB:-workspace_core}
      POSTGRES_USER: ${WORKSPACE_CORE_POSTGRES_USER:-workspace_core}
      POSTGRES_PASSWORD: ${WORKSPACE_CORE_POSTGRES_PASSWORD:-workspace_core}
    ports:
      - "${WORKSPACE_CORE_POSTGRES_PORT:-5434}:5432"
    volumes:
      - workspace_core_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${WORKSPACE_CORE_POSTGRES_USER:-workspace_core} -d ${WORKSPACE_CORE_POSTGRES_DB:-workspace_core}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak-postgres:
    profiles: ["keycloak"]
    image: postgres:15
    environment:
      POSTGRES_DB: ${KEYCLOAK_DB_NAME:-keycloak}
      POSTGRES_USER: ${KEYCLOAK_DB_USER:-keycloak}
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-local-only}
    volumes:
      - workspace_core_keycloak_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${KEYCLOAK_DB_USER:-keycloak} -d ${KEYCLOAK_DB_NAME:-keycloak}"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    profiles: ["keycloak"]
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:26.6.3}
    command: start-dev --import-realm
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: ${KEYCLOAK_DB_NAME:-keycloak}
      KC_DB_USERNAME: ${KEYCLOAK_DB_USER:-keycloak}
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD:-change-me-local-only}
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_BOOTSTRAP_ADMIN_USERNAME:-temp-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_BOOTSTRAP_ADMIN_PASSWORD:-change-me-local-only}
    ports:
      - "${KEYCLOAK_PORT:-8180}:8080"
    volumes:
      - ./keycloak/realm-import:/opt/keycloak/data/import:ro

  elasticsearch:
    image: ${ELASTICSEARCH_IMAGE:-docker.elastic.co/elasticsearch/elasticsearch:8.11.1}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: ${ELASTICSEARCH_JAVA_OPTS:--Xms512m -Xmx512m}
    ports:
      - "${ELASTICSEARCH_PORT:-9201}:9200"
    volumes:
      - workspace_core_elasticsearch_data:/usr/share/elasticsearch/data

  minio:
    image: ${MINIO_IMAGE:-minio/minio:latest}
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${WORKSPACE_CORE_OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${WORKSPACE_CORE_OBJECT_STORAGE_SECRET_KEY:-minioadmin}
    ports:
      - "${WORKSPACE_CORE_OBJECT_STORAGE_PORT:-9000}:9000"
      - "${WORKSPACE_CORE_OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - workspace_core_minio_data:/data

  minio-create-bucket:
    image: ${MINIO_MC_IMAGE:-minio/mc:latest}
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${WORKSPACE_CORE_OBJECT_STORAGE_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${WORKSPACE_CORE_OBJECT_STORAGE_SECRET_KEY:-minioadmin}
      WORKSPACE_CORE_OBJECT_STORAGE_BUCKET: ${WORKSPACE_CORE_OBJECT_STORAGE_BUCKET:-workspace-media}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 \"${WORKSPACE_CORE_OBJECT_STORAGE_ACCESS_KEY:-minioadmin}\" \"${WORKSPACE_CORE_OBJECT_STORAGE_SECRET_KEY:-minioadmin}\"; do
        sleep 2;
      done;
      /usr/bin/mc mb --ignore-existing local/\"${WORKSPACE_CORE_OBJECT_STORAGE_BUCKET:-workspace-media}\";
      "

  kafka:
    image: ${KAFKA_IMAGE:-apache/kafka:4.0.2}
    user: "0:0"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:29092,PLAINTEXT_HOST://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${WORKSPACE_CORE_KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "${WORKSPACE_CORE_KAFKA_PORT:-9092}:9092"
    volumes:
      - workspace_core_kafka_data:/tmp/kraft-combined-logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka-create-topics:
    image: ${KAFKA_IMAGE:-apache/kafka:4.0.2}
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      WORKSPACE_CORE_KAFKA_PROCESSING_REQUESTED_TOPIC: ${WORKSPACE_CORE_KAFKA_PROCESSING_REQUESTED_TOPIC:-asset.processing.requested.v1}
      WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_TOPIC: ${WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_TOPIC:-asset.processing.result.v1}
      WORKSPACE_CORE_KAFKA_INDEXING_REQUESTED_TOPIC: ${WORKSPACE_CORE_KAFKA_INDEXING_REQUESTED_TOPIC:-asset.indexing.requested.v1}
    entrypoint: >
      /bin/sh -c "
      if ! /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --describe --topic \"${WORKSPACE_CORE_KAFKA_PROCESSING_REQUESTED_TOPIC:-asset.processing.requested.v1}\" >/dev/null 2>&1; then
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --topic \"${WORKSPACE_CORE_KAFKA_PROCESSING_REQUESTED_TOPIC:-asset.processing.requested.v1}\" --partitions 1 --replication-factor 1;
      fi;
      if ! /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --describe --topic \"${WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_TOPIC:-asset.processing.result.v1}\" >/dev/null 2>&1; then
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --topic \"${WORKSPACE_CORE_KAFKA_PROCESSING_RESULT_TOPIC:-asset.processing.result.v1}\" --partitions 1 --replication-factor 1;
      fi;
      if ! /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --describe --topic \"${WORKSPACE_CORE_KAFKA_INDEXING_REQUESTED_TOPIC:-asset.indexing.requested.v1}\" >/dev/null 2>&1; then
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:29092 --create --topic \"${WORKSPACE_CORE_KAFKA_INDEXING_REQUESTED_TOPIC:-asset.indexing.requested.v1}\" --partitions 1 --replication-factor 1;
      fi;
      "

  # Redis is optional for the first milestone.
  # Uncomment this service only when workspace-core actually needs it.
  #
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "${WORKSPACE_CORE_REDIS_PORT:-6380}:6379"
  #   volumes:
  #     - workspace_core_redis_data:/data

volumes:
  workspace_core_postgres_data:
  workspace_core_keycloak_postgres_data:
  workspace_core_elasticsearch_data:
  workspace_core_minio_data:
  workspace_core_kafka_data:
  # workspace_core_redis_data:
